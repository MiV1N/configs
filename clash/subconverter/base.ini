[common]
; 基础设置
api_mode=false
enable_rule_generator=true
overwrite_original_rules=true

; 基础配置 (Meta/Mihomo 专用) - 已移至 GeneralClashConfig.yml

; 1. 自定义节点 (添加您的 SOCKS5 节点)
; 格式: 节点名, 地址, 端口, 类型, 其他参数
; append_proxy=🛠️ 内网代理,10.210.14.44,1080,socks5,udp=true

; 2. 节点改名 (示例：将常用长名称简化)
; 语法: rename=正则匹配@@@替换内容
; rename=(?i)Premium@@@优选
; rename=(?i)BGP@@@线路

[custom]
clash_rule_base=https://gh-proxy.org/https://raw.githubusercontent.com/MiV1N/configs/refs/heads/main/clash/subconverter/GeneralClashConfig.yml

; 4. 规则集配置 (基于您提供的 ACL4SSR 分组逻辑)
