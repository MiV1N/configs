; 5. 策略组配置 (按国家聚合及手动切换)
custom_proxy_group=🚀 节点选择`select`[]⚡ 自动选择`[]🖐️ 手动切换`[]🇭🇰 Hong Kong`[]🇹🇼 Taiwan`[]🇯🇵 Japan`[]🇺🇸 United States`[]DIRECT`.*
